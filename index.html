<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Todo List</h1>

    <form class="todo-form">
        <input type="text" placeholder="Buy Model S">
        <button type="submit">Add</button>
    </form>

    <hr>

    <div class="todo-list">
        <div class="todo-card">
            <div class="todo-header">
                <span>Buy milk :)</span>
                <button class="delete">✖</button>
            </div>
            <span class="time">18:44</span>
        </div>

        <div class="todo-card">
            <div class="todo-header">
                <span>End the project</span>
                <button class="delete">✖</button>
            </div>
            <span class="time">18:44</span>
        </div>

        <div class="todo-card">
            <div class="todo-header">
                <span>Call mom</span>
                <button class="delete">✖</button>
            </div>
            <span class="time">18:44</span>
        </div>

        <div class="todo-card">
            <div class="todo-header">
                <span>Sleep 10 hrs</span>
                <button class="delete">✖</button>
            </div>
            <span class="time">18:44</span>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
