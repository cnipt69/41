<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Todo List</h1>
    
    <div class="form">
        <input type="text" id="todo-input" placeholder="Buy Model S">
        <button id="add-btn">Add</button>
    </div>

    <hr>

    <div id="todo-grid">
        <div class="card">
            <div class="card-text">Buy milk :)</div>
            <div class="card-time">18:44</div>
            <button class="del-btn">x</button>
        </div>

        <div class="card">
            <div class="card-text">End the project</div>
            <div class="card-time">18:44</div>
            <button class="del-btn">x</button>
        </div>

        <div class="card">
            <div class="card-text">Call mom</div>
            <div class="card-time">18:44</div>
            <button class="del-btn">x</button>
        </div>

        <div class="card">
            <div class="card-text">Sleep 10 hrs</div>
            <div class="card-time">18:44</div>
            <button class="del-btn">x</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
